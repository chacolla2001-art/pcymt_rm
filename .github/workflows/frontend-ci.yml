name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/web-admin/**'
      - 'shared/map-stickers/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/web-admin/**'
      - 'shared/map-stickers/**'

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: apps/web-admin/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/web-admin
        run: npm ci

      - name: Run linter
        working-directory: ./apps/web-admin
        run: npm run lint || true

      - name: Run tests
        working-directory: ./apps/web-admin
        run: npm run test:coverage || true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/web-admin/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: apps/web-admin/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/web-admin
        run: npm ci

      - name: Create environment file
        working-directory: ./apps/web-admin
        run: |
          cat > .env << EOF
          VITE_API_URL=http://localhost:5000
          VITE_ENV_NAME=production
          VITE_PRODUCTION=true
          EOF

      - name: Build production
        working-directory: ./apps/web-admin
        run: npm run build:prod

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: apps/web-admin/dist
          retention-days: 7

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web-admin
          file: ./apps/web-admin/Dockerfile
          push: false
          tags: pcymt-rm-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
