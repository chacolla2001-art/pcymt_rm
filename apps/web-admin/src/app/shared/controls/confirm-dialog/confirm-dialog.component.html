@if (data.icon) {
  <div class="dialog-icon">
    <mat-icon [color]="data.iconColor || 'warn'">{{ data.icon }}</mat-icon>
  </div>
}

<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p class="dialog-message">{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button class="control-button" (click)="dialogRef.close(false)">
    <mat-icon>close</mat-icon>
    <span class="label">{{ data.cancelText || 'Cancelar' }}</span>
  </button>
  <button mat-raised-button color="primary" class="control-button" (click)="dialogRef.close(true)">
    <mat-icon>check</mat-icon>
    <span class="label">{{ data.confirmText || 'Confirmar' }}</span>
  </button>
</mat-dialog-actions>
