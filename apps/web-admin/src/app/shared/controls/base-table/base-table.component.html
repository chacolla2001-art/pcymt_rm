@if (isLoading) {
  <div class="spinner-container">
    <mat-spinner diameter="60"></mat-spinner>
  </div>
} @else {
  <div class="tools-container">
    <!-- Search Controls -->
    <div class="search-controls">
      <mat-form-field appearance="fill" subscriptSizing="dynamic" class="search-input">
        <mat-label>Buscar</mat-label>
        <input #searchInput matInput [placeholder]="searchPlaceholder" (keydown.enter)="applyFilter(searchInput.value)">
      </mat-form-field>

      <button mat-raised-button class="control-button" (click)="applyFilter(searchInput.value)">
        <mat-icon>search</mat-icon>
        <span class="label">Buscar</span>
      </button>

      <mat-form-field appearance="fill" subscriptSizing="dynamic" class="status-filter">
        <mat-label>Estados</mat-label>
        <mat-select [(value)]="selectedStatus" (selectionChange)="applyStatusFilter()">
          <mat-option value="all">Todos</mat-option>
          <mat-option value="active">Activos</mat-option>
          <mat-option value="inactive">Inactivos</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Action Buttons -->
    @if (currentLoadType !== 'anchorPoints') {
      <button mat-raised-button color="primary" class="control-button" (click)="openDialog()">
        <mat-icon>add</mat-icon>
        <span class="label">Nuevo registro</span>
      </button>
    }

    @if (isFilteredById) {
      <button mat-raised-button color="accent" class="control-button" (click)="clearIdFilter()">
        <mat-icon>filter_list_off</mat-icon>
        <span class="label">Mostrar todos</span>
      </button>
    }
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">
    @for (column of displayedColumns; track column) {
      <ng-container [matColumnDef]="column">
        <th mat-header-cell *matHeaderCellDef>{{ columnNames[column] ?? column }}</th>
        <td mat-cell *matCellDef="let element">
          <ng-content [select]="'[column-' + column + ']'"></ng-content>
          <ng-container *ngIf="!hasColumnContent(column)">
            {{ element[column] }}
          </ng-container>
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <div class="paginator-container">
    <mat-paginator #paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Seleccionar página"></mat-paginator>
  </div>
}
