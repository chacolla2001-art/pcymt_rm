<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Realidad Mixta</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <!-- Runtime environment configuration -->
  <script src="assets/env.js"></script>
  <!-- Google Maps API - key loaded from environment -->
  <script>
    // Load Google Maps dynamically to avoid hardcoded API key
    (function() {
      var apiKey = window.__GOOGLE_MAPS_API_KEY__ || '';
      if (apiKey) {
        var script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=' + apiKey + '&v=beta';
        script.defer = true;
        document.head.appendChild(script);
      }
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body class="mat-typography">
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
